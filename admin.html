<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка | ComfortStay</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="admin-header">
    <h2>🛠️ Админ-панель</h2>
    <button id="logout-btn" class="btn-logout">🚪 Выйти</button>
  </header>

  <main class="container">
    <h3 class="mb-2">📋 Заявки на бронирование</h3>
    
    <div class="stats">
      <div>Всего: <b id="count-total">0</b></div>
      <div>Ожидают: <b id="count-pending">0</b></div>
      <div>Одобрено: <b id="count-approved">0</b></div>
    </div>
    
    <button id="refresh-btn" class="btn-ref mb-2">🔄 Обновить</button>
    
    <div class="table-wrapper">
      <table id="bookings-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Клиент</th>
            <th>Телефон</th>
            <th>Номер</th>
            <th>Даты</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="7" class="empty-state">Заявок пока нет</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Модальное окно деталей -->
  <div id="booking-modal" class="modal">
    <div class="modal-box">
      <span class="modal-close" id="modal-close">×</span>
      <h4>📄 Детали заявки #<span id="modal-id"></span></h4>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-approve" class="btn btn-ok">✅ Одобрить</button>
        <button id="modal-delete" class="btn btn-del">🗑️ Удалить</button>
      </div>
    </div>
  </div>

  <footer>
    <p>ComfortStay Admin Panel © 2026</p>
  </footer>

  <script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!App.requireAuth()) return;

  document.getElementById('logout-btn').addEventListener('click', () => {
    App.logout();
    window.location.href = 'login.html';
  });

  document.getElementById('refresh-btn').addEventListener('click', renderTable);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('booking-modal').addEventListener('click', e => {
    if (e.target.id === 'booking-modal') closeModal();
  });
  document.getElementById('modal-approve').addEventListener('click', () => {
    App.updateStatus(document.getElementById('modal-id').textContent, 'approved');
    closeModal();
  });
  document.getElementById('modal-delete').addEventListener('click', () => {
    if (confirm('Удалить заявку?')) {
      App.deleteBooking(document.getElementById('modal-id').textContent);
      closeModal();
    }
  });

  // 🔄 Автообновление: при возврате на вкладку + каждые 2 сек
  window.addEventListener('focus', renderTable);
  setInterval(renderTable, 2000);

  renderTable();
});

function renderTable() {
  const bookings = App.getBookings().sort((a, b) => b.id - a.id);
  const tbody = document.querySelector('#bookings-table tbody');
  if (!bookings.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Заявок пока нет</td></tr>';
    updateCounters(); return;
  }
  tbody.innerHTML = bookings.map(b => `
    <tr>
      <td>${b.id}</td>
      <td>${App.escapeHtml(b.surname)} ${App.escapeHtml(b.name)}</td>
      <td>${App.escapeHtml(b.phone)}</td>
      <td>${App.escapeHtml(b.roomName || b.category)}</td>
      <td>${App.formatDate(b.checkin)} – ${App.formatDate(b.checkout)}</td>
      <td class="${b.status === 'pending' ? 'status-pending' : 'status-approved'}">
        ${b.status === 'pending' ? '⏳ Ожидает' : '✅ Одобрено'}
      </td>
      <td>
        <button class="btn btn-ok" onclick="openModal(${b.id})">👁️</button>
        ${b.status === 'pending' ? `<button class="btn btn-ok" onclick="App.updateStatus(${b.id},'approved');renderTable();">✅</button>` : ''}
        <button class="btn btn-del" onclick="if(confirm('Удалить?')){App.deleteBooking(${b.id});renderTable();}">🗑️</button>
      </td>
    </tr>
  `).join('');
  updateCounters();
}

function updateCounters() {
  const c = App.getCounters();
  document.getElementById('count-total').textContent = c.total;
  document.getElementById('count-pending').textContent = c.pending;
  document.getElementById('count-approved').textContent = c.approved;
}

function openModal(id) {
  const b = App.findBooking(id);
  if (!b) return;
  document.getElementById('modal-id').textContent = b.id;
  document.getElementById('modal-body').innerHTML = `
    <p><b>ФИО:</b> ${App.escapeHtml(b.surname)} ${App.escapeHtml(b.name)}</p>
    <p><b>Телефон:</b> ${App.escapeHtml(b.phone)}</p>
    <p><b>Email:</b> ${App.escapeHtml(b.email)}</p>
    <p><b>Номер:</b> ${App.escapeHtml(b.roomName || b.category)}</p>
    <p><b>Даты:</b> ${App.formatDate(b.checkin)} – ${App.formatDate(b.checkout)}</p>
    <small style="color:var(--text-light)">Создано: ${new Date(b.createdAt).toLocaleString('ru-RU')}</small>
  `;
  document.getElementById('booking-modal').classList.add('show');
}
function closeModal() {
  document.getElementById('booking-modal').classList.remove('show');
  renderTable();
}
window.openModal = openModal;
</script>
</body>
</html>
